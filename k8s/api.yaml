---
# API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oban-api
  namespace: oban-eats
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oban-api
  template:
    metadata:
      labels:
        app: oban-api
    spec:
      initContainers:
      - name: migration
        image: oban-eats:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: oban-config
              key: ENVIRONMENT
        - name: POSTGRES_USER
          valueFrom:
            configMapKeyRef:
              name: oban-config
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            configMapKeyRef:
              name: oban-config
              key: POSTGRES_PASSWORD
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: oban-config
              key: POSTGRES_DB
        - name: DATABASE_URL
          value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres-service:5432/$(POSTGRES_DB)"
        command: ["alembic", "upgrade", "head"]

      containers:
      - name: api
        image: oban-eats:latest
        imagePullPolicy: IfNotPresent
        # Uses default CMD from Dockerfile: uvicorn src.api:app --host 0.0.0.0 --port 8000
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: oban-config
              key: ENVIRONMENT
        - name: API_TITLE
          valueFrom:
            configMapKeyRef:
              name: oban-config
              key: API_TITLE
        - name: POSTGRES_USER
          valueFrom:
            configMapKeyRef:
              name: oban-config
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            configMapKeyRef:
              name: oban-config
              key: POSTGRES_PASSWORD
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: oban-config
              key: POSTGRES_DB
        - name: DATABASE_URL
          value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres-service:5432/$(POSTGRES_DB)"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 6
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10

---
# API Service
apiVersion: v1
kind: Service
metadata:
  name: oban-api-service
  namespace: oban-eats
spec:
  selector:
    app: oban-api
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
  type: ClusterIP

---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: oban-api-ingress
  namespace: oban-eats
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /api(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: oban-api-service
            port:
              number: 8000
